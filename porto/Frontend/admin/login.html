<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Portofolio</title>
    <meta name="description" content="Halaman login admin panel portofolio">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
</head>
<body>

    <div class="login-container">
        <!-- Logo -->
        <div class="login-logo">
            <div class="logo-icon"><i class="fas fa-user-shield"></i></div>
            <h1>Admin Panel</h1>
            <p>Sistem Portofolio Web</p>
        </div>

        <!-- Card Login -->
        <div class="login-card">
            <h2>Selamat Datang 👋</h2>
            <p class="subtitle">Masukkan kredensial Anda untuk mengakses panel admin.</p>

            <!-- Alert Error -->
            <div class="error-alert" id="error-alert">
                <i class="fas fa-exclamation-circle"></i>
                <span id="error-msg">Username atau password salah.</span>
            </div>

            <!-- Form Login -->
            <form id="login-form" autocomplete="off">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" name="username"
                               placeholder="Masukkan username" required autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password"
                               placeholder="Masukkan password" required autocomplete="current-password">
                        <button type="button" class="toggle-password" id="toggle-password" tabindex="-1">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="btn-login">
                    <span id="btn-text">Masuk ke Panel Admin</span>
                    <div class="spinner" id="btn-spinner" style="display:none"></div>
                </button>
            </form>
        </div>

        <!-- Back to main site -->
        <div class="back-link">
            <a href="/"><i class="fas fa-arrow-left"></i> Kembali ke Halaman Utama</a>
        </div>
    </div>

    <script src="../../admin/js/api.js"></script>
    <script src="../js/login.js"></script>
</body>
</html>
